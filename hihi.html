<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <style>
            body{
                background-image: url(jeh.jfif);
                background-size:cover;
                background-position:center;
                background-repeat:no-repeat;
                min-height:100vh;
                margin:0;
                overflow:hidden;
            }
            h1{
                color:aliceblue;
                font-size:small;
                font-family:"Brush Script MT"cursive;
                top:600px;
                left:1200px;
                position:absolute; 
            }
            #counter{
                font-size:28px;
                margin-top:10px;
            }
            #square{
                width:120px;
                height:120px;
                position:absolute;
                cursor:pointer;
                transition:0.15s;
            }
            #timer{
                font-size:40px;
                font-weight:bold;
                color:white;
            }
            #text.Content{
                color:aliceblue;
            }
            #jumpscare{
                display:none;
                position:fixed;
                top:0;
                left:0;
                width:100%;
                height:100%;
                object-fit:cover;
                z-index:9999;
                pointer-events: none;
                background:black;
            }
        </style>
    </head>
    <body>
        <h1>CLIIICK HIM</h1>
        <div id="counter">0/10</div>
        <img id="square" src="block.jfif" alt="square">
        <div id="timer">13</div>
        <img id="jumpscare" src="scr.jfif" style="display: none;">
        <audio id="bgMusic" loop>
            <source src="song.mp3" type="audio/mpeg">
        </audio>
        <audio id="scream">
            <source src="scary.mp3" type="audio/mpeg">
        </audio>
        <script>
           let clicks = 0;
        const square = document.getElementById("square");

        function moveSquare() {
            let maxX = window.innerWidth - square.offsetWidth;
            let maxY = window.innerHeight - square.offsetHeight;

            let randomX = Math.random() * maxX;
            let randomY = Math.random() * maxY;

            square.style.left = randomX + "px";
            square.style.top = randomY + "px";
        }

             square.onclick = function () {
             clicks++;
              document.getElementById("counter").innerText = clicks + "/10";

               if (clicks == 6) {
                 console.log("JUMPSCARE TRIGGERED");
                 const scare = document.getElementById("jumpscare");
                 const scream = document.getElementById("scream");

                 scare.style.display = "block";
                 scream.play();

                    setTimeout(() => {
                   scare.style.display = "none";
                }, 1000);
            }

            if (clicks >= 10) {
                alert("redirect now");
                window.location.href = "hehe.html";
            } else {
                moveSquare();
            }
        };

        moveSquare();
         let timeLeft = 13;
         const timerDisplay = document.getElementById("timer");

         const timer = setInterval(() => {
            timeLeft--;
            timerDisplay.textContent = timeLeft;

            if (timeLeft <= 0) {
                clearInterval(timer);
                timerDisplay.textContent = "HA TIME'S UP";
                alert("hahahahah game over");
            }
        }, 1000);
        document.addEventListener("click", function startOnce() {
            const music = document.getElementById("bgMusic");
            music.play();
            document.removeEventListener("click", startOnce);
        });
        </script>
    </body>
</html>
