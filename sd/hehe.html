<!DOCTYPE html>
<body>
    <video id="hpy" loop controls>
        <source src="VID_20260423_201724.mp4" type="video/mp4">
    </video>
    <button onclick="document.getElementById('hpy').play()">
        play
    </button>
    <style>
        #hpy{
            position:fixed;
            top:5;
            left:5;
            width:100%;
            height:100%;
            object-fit:contain;
            z-index:-1;
        }
    </style>
    <script>
        function playVideo(){
            const video= document.getElementById("hpy");
            video.muted=false;
            video.play();
        }
        </script>
</body>
</html>
